<script>
  const API_BASE = "https://bot-host--iunno.replit.app"; // your bot

  function handleGetVIP(e) {
    e.preventDefault();
    window.open("https://www.roblox.com/game-pass/1760727863/Get-VIP", "_blank");

    document.getElementById("mainPage").style.display = "none";
    document.getElementById("redeemScreen").classList.add("active");

    setTimeout(() => document.getElementById("keyInput").focus(), 100);
  }

  function goBack() {
    document.getElementById("redeemScreen").classList.remove("active");
    document.getElementById("mainPage").style.display = "block";

    document.getElementById("errMsg").classList.remove("show");
    document.getElementById("keyInput").value = "";
  }

  async function checkKey() {
    const key = document.getElementById("keyInput").value.trim();

    const btn = document.getElementById("submitBtn");
    const err = document.getElementById("errMsg");

    if (!key) return;

    btn.disabled = true;
    btn.textContent = "Checking...";
    err.classList.remove("show");

    try {
      const res = await fetch(`${API_BASE}/verify`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key })
      });

      const data = await res.json();

      if (data.valid) {
        document.getElementById("redeemScreen").classList.remove("active");
        document.getElementById("successScreen").classList.add("active");
      } else {
        err.textContent = "❌ invalid VIP key";
        err.classList.add("show");
      }

    } catch (e) {
      err.textContent = "⚠ server offline / bot not responding";
      err.classList.add("show");
    }

    btn.disabled = false;
    btn.textContent = "🔓 Unlock VIP";
  }

  function showMain() {
    document.getElementById("successScreen").classList.remove("active");
    document.getElementById("mainPage").style.display = "block";
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter" &&
        document.getElementById("redeemScreen").classList.contains("active")) {
      checkKey();
    }
  });
</script>
