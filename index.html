<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>rEBACK VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#000;
  color:#e0e0e0;
  font-family:'Rajdhani',sans-serif;
}

.scanline{
  background:#000;
  background-image:repeating-linear-gradient(
    0deg,
    rgba(0,255,100,0.012) 0px,
    rgba(0,255,100,0.012) 1px,
    transparent 1px,
    transparent 3px
  );
}

/* HERO */
.hero{
  text-align:center;
  padding:3rem 2rem;
  border-bottom:1px solid rgba(0,255,100,0.18);
  background:radial-gradient(ellipse at 50% 0%,rgba(0,255,100,0.07),transparent 70%);
}

.title{
  font-size:52px;
  font-weight:700;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#fff;
}

.green{color:#0f6;text-shadow:0 0 20px rgba(0,255,100,0.4);}
.crown{font-size:34px;display:block;margin-bottom:10px;}
.subtitle{
  font-family:'Share Tech Mono';
  font-size:12px;
  letter-spacing:4px;
  color:rgba(0,255,100,0.5);
  margin-top:10px;
}

/* BOX */
.box{
  margin:2rem auto;
  width:90%;
  max-width:420px;
  background:#050f09;
  border:1px solid rgba(0,255,100,0.25);
  padding:2rem;
  border-radius:5px;
  text-align:center;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  background:#000;
  border:1px solid rgba(0,255,100,0.25);
  color:#0f6;
  text-align:center;
  font-family:'Share Tech Mono';
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  background:rgba(0,255,100,0.1);
  border:1px solid rgba(0,255,100,0.5);
  color:#0f6;
  font-weight:700;
  letter-spacing:3px;
  cursor:pointer;
}

button:hover{
  background:rgba(0,255,100,0.18);
}

.error{
  display:none;
  color:#ff4d4d;
  margin-top:10px;
  font-family:'Share Tech Mono';
  font-size:12px;
}
.show{display:block;}
</style>
</head>

<body class="scanline">

<div class="hero">
  <span class="crown">👑</span>
  <div class="title"><span class="green">r</span><span class="green">E</span>BACK VIP</div>
  <div class="subtitle">exclusive access system</div>
</div>

<div class="box">
  <input id="keyInput" placeholder="reback-xxxxxxx" />
  <button onclick="checkKey()" id="btn">UNLOCK VIP</button>
  <div class="error" id="err">Invalid key or server offline</div>
</div>

<script>
const API_BASE = "https://YOUR-REPLIT-APP.replit.app"; // FIX THIS

async function checkKey(){
  const key = document.getElementById("keyInput").value.trim();
  const err = document.getElementById("err");
  const btn = document.getElementById("btn");

  if(!key) return;

  btn.textContent = "CHECKING...";

  try {
    const res = await fetch(`${API_BASE}/verify`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ key })
    });

    const data = await res.json();

    if(data.valid){
      alert("VIP UNLOCKED 👑");
    } else {
      err.classList.add("show");
    }

  } catch(e){
    err.textContent = "Server offline / wrong URL";
    err.classList.add("show");
  }

  btn.textContent = "UNLOCK VIP";
}
</script>

</body>
</html>
